<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<title>Air Quality Monitoring</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #ffffff;
        color: #000000;
        text-align: center;
    }
    h1 {
        margin-top: 20px;
    }
    .graph-container {
        margin: 30px auto;
        padding: 15px;
        border: 1px solid #cccccc;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    img {
        max-width: 100%;
        height: auto;
    }
    .footer {
        margin-top: 40px;
        font-size: 12px;
        color: #666666;
    }
</style>
</head>
<body>

<h1>Air Quality Monitoring</h1>

<div class="graph-container">
    <h2>Ultime 4 Ore</h2>
    <img class="graph" src="images/aqi_4h.png" alt="Air Quality Index - Ultime 4 Ore">
    <img class="graph" src="images/temperature_4h.png" alt="Temperatura - Ultime 4 Ore">
    <img class="graph" src="images/humidity_4h.png" alt="Umidità - Ultime 4 Ore">
    <img class="graph" src="images/voc_4h.png" alt="COV - Ultime 4 Ore">
    <img class="graph" src="images/co_4h.png" alt="CO - Ultime 4 Ore">
    <img class="graph" src="images/pm25_4h.png" alt="PM2.5 - Ultime 4 Ore">
</div>

<div class="graph-container">
    <h2>Ultimo Giorno</h2>
    <img class="graph" src="images/aqi_1d.png" alt="Air Quality Index - Ultimo Giorno">
    <img class="graph" src="images/temperature_1d.png" alt="Temperatura - Ultimo Giorno">
    <img class="graph" src="images/humidity_1d.png" alt="Umidità - Ultimo Giorno">
    <img class="graph" src="images/voc_1d.png" alt="COV - Ultimo Giorno">
    <img class="graph" src="images/co_1d.png" alt="CO - Ultimo Giorno">
    <img class="graph" src="images/pm25_1d.png" alt="PM2.5 - Ultimo Giorno">
</div>

<div class="graph-container">
    <h2>Ultima Settimana</h2>
    <img class="graph" src="images/aqi_1w.png" alt="Air Quality Index - Ultima Settimana">
    <img class="graph" src="images/temperature_1w.png" alt="Temperatura - Ultima Settimana">
    <img class="graph" src="images/humidity_1w.png" alt="Umidità - Ultima Settimana">
    <img class="graph" src="images/voc_1w.png" alt="COV - Ultima Settimana">
    <img class="graph" src="images/co_1w.png" alt="CO - Ultima Settimana">
    <img class="graph" src="images/pm25_1w.png" alt="PM2.5 - Ultima Settimana">
</div>

<div class="graph-container">
    <h2>Ultimo Mese</h2>
    <img class="graph" src="images/aqi_1m.png" alt="Air Quality Index - Ultimo Mese">
    <img class="graph" src="images/temperature_1m.png" alt="Temperatura - Ultimo Mese">
    <img class="graph" src="images/humidity_1m.png" alt="Umidità - Ultimo Mese">
    <img class="graph" src="images/voc_1m.png" alt="COV - Ultimo Mese">
    <img class="graph" src="images/co_1m.png" alt="CO - Ultimo Mese">
    <img class="graph" src="images/pm25_1m.png" alt="PM2.5 - Ultimo Mese">
</div>

<div class="graph-container">
    <h2>Ultimo Anno</h2>
    <img class="graph" src="images/aqi_1y.png" alt="Air Quality Index - Ultimo Anno">
    <img class="graph" src="images/temperature_1y.png" alt="Temperatura - Ultimo Anno">
    <img class="graph" src="images/humidity_1y.png" alt="Umidità - Ultimo Anno">
    <img class="graph" src="images/voc_1y.png" alt="COV - Ultimo Anno">
    <img class="graph" src="images/co_1y.png" alt="CO - Ultimo Anno">
    <img class="graph" src="images/pm25_1y.png" alt="PM2.5 - Ultimo Anno">
</div>

<div class="graph-container">
    <h2>Ultimi 5 Anni</h2>
    <img class="graph" src="images/aqi_5y.png" alt="Air Quality Index - Ultimi 5 Anni">
    <img class="graph" src="images/temperature_5y.png" alt="Temperatura - Ultimi 5 Anni">
    <img class="graph" src="images/humidity_5y.png" alt="Umidità - Ultimi 5 Anni">
    <img class="graph" src="images/voc_5y.png" alt="COV - Ultimi 5 Anni">
    <img class="graph" src="images/co_5y.png" alt="CO - Ultimi 5 Anni">
    <img class="graph" src="images/pm25_5y.png" alt="PM2.5 - Ultimi 5 Anni">
</div>

<div class="footer">
    Aggiornamento automatico ogni 60 secondi
</div>

<script>

function refreshGraphs() {

    const graphs = document.querySelectorAll(".graph");

    graphs.forEach(function(img){

        const base = img.src.split("?")[0];

        img.src = base + "?v=" + Date.now();

    });

}

setInterval(refreshGraphs, 60000);

</script>

</body>
</html>
